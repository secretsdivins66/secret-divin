<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Secret Divin">
  <defs>
    <radialGradient id="sd-bg" cx="50%" cy="46%" r="60%">
      <stop offset="0%" stop-color="#162056"/>
      <stop offset="65%" stop-color="#0e1640"/>
      <stop offset="100%" stop-color="#05081c"/>
    </radialGradient>
    <linearGradient id="sd-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd76a"/>
      <stop offset="50%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#c9851a"/>
    </linearGradient>
  </defs>

  <!-- Fond du sceau -->
  <circle cx="200" cy="200" r="192" fill="url(#sd-bg)" stroke="url(#sd-gold)" stroke-width="3"/>

  <!-- Anneau extérieur ouvragé -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="url(#sd-gold)" stroke-width="1.4" opacity="0.55"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="url(#sd-gold)" stroke-width="2.2"/>

  <!-- Étoiles à 8 branches aux points cardinaux -->
  <g fill="url(#sd-gold)">
    <g transform="translate(200,28)">
      <path d="M0,-9 L2.6,-2.6 L9,0 L2.6,2.6 L0,9 L-2.6,2.6 L-9,0 L-2.6,-2.6 Z"/>
      <path d="M0,-6.4 L1.8,-1.8 L6.4,0 L1.8,1.8 L0,6.4 L-1.8,1.8 L-6.4,0 L-1.8,-1.8 Z" transform="rotate(45)"/>
    </g>
    <g transform="translate(200,372)">
      <path d="M0,-9 L2.6,-2.6 L9,0 L2.6,2.6 L0,9 L-2.6,2.6 L-9,0 L-2.6,-2.6 Z"/>
      <path d="M0,-6.4 L1.8,-1.8 L6.4,0 L1.8,1.8 L0,6.4 L-1.8,1.8 L-6.4,0 L-1.8,-1.8 Z" transform="rotate(45)"/>
    </g>
    <g transform="translate(28,200)">
      <path d="M0,-9 L2.6,-2.6 L9,0 L2.6,2.6 L0,9 L-2.6,2.6 L-9,0 L-2.6,-2.6 Z"/>
      <path d="M0,-6.4 L1.8,-1.8 L6.4,0 L1.8,1.8 L0,6.4 L-1.8,1.8 L-6.4,0 L-1.8,-1.8 Z" transform="rotate(45)"/>
    </g>
    <g transform="translate(372,200)">
      <path d="M0,-9 L2.6,-2.6 L9,0 L2.6,2.6 L0,9 L-2.6,2.6 L-9,0 L-2.6,-2.6 Z"/>
      <path d="M0,-6.4 L1.8,-1.8 L6.4,0 L1.8,1.8 L0,6.4 L-1.8,1.8 L-6.4,0 L-1.8,-1.8 Z" transform="rotate(45)"/>
    </g>
  </g>

  <!-- Petits ornements en diagonale -->
  <g fill="url(#sd-gold)" opacity="0.85">
    <circle cx="86" cy="86" r="4.2"/>
    <circle cx="314" cy="86" r="4.2"/>
    <circle cx="86" cy="314" r="4.2"/>
    <circle cx="314" cy="314" r="4.2"/>
  </g>

  <!-- Cercle intérieur du médaillon -->
  <circle cx="200" cy="200" r="148" fill="none" stroke="url(#sd-gold)" stroke-width="1.2" opacity="0.5"/>

  <!-- Calligraphie arabe (haut) -->
  <text x="200" y="106" text-anchor="middle" fill="url(#sd-gold)"
        font-family="'Noto Naskh Arabic', serif" font-size="25" font-weight="600"
        direction="rtl" style="letter-spacing:1px">السر الإلهي</text>

  <!-- Carré magique (Buduh) -->
  <g stroke="url(#sd-gold)" stroke-width="2" fill="none">
    <rect x="145" y="140" width="110" height="110" rx="3"/>
    <line x1="181.7" y1="140" x2="181.7" y2="250"/>
    <line x1="218.3" y1="140" x2="218.3" y2="250"/>
    <line x1="145" y1="176.7" x2="255" y2="176.7"/>
    <line x1="145" y1="213.3" x2="255" y2="213.3"/>
  </g>
  <g fill="url(#sd-gold)" font-family="'Noto Naskh Arabic', serif" font-size="22" text-anchor="middle">
    <text x="163.3" y="166">٤</text>
    <text x="200"   y="166">٩</text>
    <text x="236.7" y="166">٢</text>
    <text x="163.3" y="203">٣</text>
    <text x="200"   y="203">٥</text>
    <text x="236.7" y="203">٧</text>
    <text x="163.3" y="239.5">٨</text>
    <text x="200"   y="239.5">١</text>
    <text x="236.7" y="239.5">٦</text>
  </g>

  <!-- Texte SECRET DIVIN (bas) -->
  <text x="200" y="288" text-anchor="middle" fill="url(#sd-gold)"
        font-family="Inter, sans-serif" font-size="25" font-weight="700"
        style="letter-spacing:5px">SECRET DIVIN</text>
  <line x1="158" y1="300" x2="242" y2="300" stroke="url(#sd-gold)" stroke-width="1.2" opacity="0.7"/>
  <text x="200" y="318" text-anchor="middle" fill="url(#sd-gold)" opacity="0.75"
        font-family="'Noto Naskh Arabic', serif" font-size="14" style="letter-spacing:3px">الحكمة الروحية</text>
</svg>
